# API and UI tests run in parallel (separate jobs) — faster CI, separate artifacts & summaries.
name: QA Tests (UI + API)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  api-tests:
    name: API (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python test dependencies
        run: python -m pip install -r tests/api/requirements.txt

      - name: Run API tests + HTML report
        env:
          RUN_API_TESTS: "1"
        run: |
          mkdir -p reports/api
          python -m pytest tests/api -v \
            --html=reports/api/index.html \
            --self-contained-html

      - name: API summary for GitHub Actions
        if: always()
        run: |
          echo "### API smoke tests (pytest)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Job:** API (pytest)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **HTML report:** download artifact **api-html-report** below" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Target:** production Netlify (default) — see \`API_BASE_URL\` in tests" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload API HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-html-report
          path: reports/api/
          if-no-files-found: warn

  ui-tests:
    name: UI (Playwright)
    runs-on: ubuntu-latest
    env:
      # Ensures HTML report is written instead of trying to open a browser on the runner.
      PLAYWRIGHT_HTML_OPEN: never
      # Explicit Allure results dir (matches allure-js-commons + allure-playwright v2).
      ALLURE_RESULTS_DIR: allure-results
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests + HTML report
        run: npx playwright test

      - name: Setup Java (Allure CLI needs a JRE)
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate Allure static HTML (from allure-results)
        if: always()
        shell: bash
        run: |
          set -eu
          echo "::group::Allure results (raw)"
          if [ -d allure-results ]; then
            find allure-results -type f | wc -l
            find allure-results -type f | head -20 || true
          else
            echo "no allure-results directory"
          fi
          echo "::endgroup::"
          if [ -d allure-results ] && [ -n "$(find allure-results -type f 2>/dev/null | head -1)" ]; then
            npx allure generate allure-results -o allure-report --clean
            du -sh allure-report || true
            # Single archive: upload-artifact v4.4+ skips dotfiles; Allure uses many small assets — tar keeps the full site.
            tar -czf allure-report-site.tgz -C allure-report .
            ls -la allure-report-site.tgz
          else
            mkdir -p allure-report
            echo '<!DOCTYPE html><html><body><p>No Allure results in this run.</p></body></html>' > allure-report/index.html
            tar -czf allure-report-site.tgz -C allure-report .
            ls -la allure-report-site.tgz
          fi

      - name: UI summary for GitHub Actions
        if: always()
        run: |
          echo "### UI tests (Playwright)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Job:** UI (Playwright)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **HTML report:** artifact **playwright-html-report**" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Allure:** **allure-results** (raw), **allure-report-site.tgz** (extract → open \`index.html\`)" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report
          if-no-files-found: warn
          include-hidden-files: true

      # Screenshots, videos, and traces live under test-results/ when tests fail.
      - name: Upload Playwright failure assets (screenshots, video, trace)
        if: ${{ failure() && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          retention-days: 14
          if-no-files-found: warn
          include-hidden-files: true

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: warn
          include-hidden-files: true

      - name: Upload Allure HTML (tarball — full report)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-site
          path: allure-report-site.tgz
          if-no-files-found: warn
